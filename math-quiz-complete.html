        // Math Quiz Application
        class MathQuiz {
            constructor() {
                this.questions = QUESTIONS_DATA;
                this.currentChapter = null;
                this.currentQuestionIndex = 0;
                this.userAnswers = [];
                this.score = 0;
                this.isQuizActive = false;
                
                this.initializeElements();
                this.renderChapterSelection();
            }

            initializeElements() {
                // Main containers
                this.chapterSelection = document.getElementById('chapterSelection');
                this.quizContainer = document.getElementById('quizContainer');
                this.resultsContainer = document.getElementById('resultsContainer');
                
                // Quiz elements
                this.quizTitle = document.getElementById('quizTitle');
                this.questionCounter = document.getElementById('questionCounter');
                this.progressFill = document.getElementById('progressFill');
                this.questionText = document.getElementById('questionText');
                this.optionsContainer = document.getElementById('optionsContainer');
                
                // Buttons
                this.backBtn = document.getElementById('backBtn');
                this.prevBtn = document.getElementById('prevBtn');
                this.nextBtn = document.getElementById('nextBtn');
                this.submitBtn = document.getElementById('submitBtn');
                this.restartBtn = document.getElementById('restartBtn');
                
                // Results elements
                this.scoreDisplay = document.getElementById('scoreDisplay');
                this.scoreMessage = document.getElementById('scoreMessage');
                
                this.bindEvents();
            }

            bindEvents() {
                this.backBtn.addEventListener('click', () => this.showChapterSelection());
                this.prevBtn.addEventListener('click', () => this.previousQuestion());
                this.nextBtn.addEventListener('click', () => this.nextQuestion());
                this.submitBtn.addEventListener('click', () => this.submitQuiz());
                this.restartBtn.addEventListener('click', () => this.showChapterSelection());
            }

            renderChapterSelection() {
                this.chapterSelection.innerHTML = '';
                
                this.questions.forEach((chapter, index) => {
                    const chapterCard = document.createElement('div');
                    chapterCard.className = 'chapter-card';
                    chapterCard.innerHTML = `
                        <h3>📚 Chapter ${chapter.chapter}</h3>
                        <p>${this.getChapterDescription(chapter.chapter)}</p>
                        <p><strong>10 Questions</strong></p>
                    `;
                    
                    chapterCard.addEventListener('click', () => this.startChapter(index));
                    this.chapterSelection.appendChild(chapterCard);
                });
            }

            getChapterDescription(chapterNumber) {
                const descriptions = [
                    "Basic Rectangles & Triangles",
                    "Garden & Floor Problems", 
                    "Picture Frames & Windows",
                    "Everyday Objects",
                    "Kitchen & Home Items",
                    "Doors & Mirrors",
                    "Parks & Large Spaces",
                    "School & Classroom",
                    "Sports & Recreation",
                    "Furniture & Tables",
                    "Photos & Art",
                    "Buildings & Rooms",
                    "Large Areas & Fields",
                    "Swimming Pools",
                    "Mixed Shapes",
                    "Advanced Problems",
                    "Real World Applications",
                    "Complex Calculations",
                    "Challenge Problems",
                    "Master Level"
                ];
                return descriptions[chapterNumber - 1] || "Math Problems";
            }

            startChapter(chapterIndex) {
                this.currentChapter = this.questions[chapterIndex];
                this.currentQuestionIndex = 0;
                this.userAnswers = new Array(this.currentChapter.questions.length).fill(null);
                this.score = 0;
                this.isQuizActive = true;
                
                this.showQuizContainer();
                this.renderQuestion();
            }

            showChapterSelection() {
                this.chapterSelection.style.display = 'grid';
                this.quizContainer.style.display = 'none';
                this.resultsContainer.style.display = 'none';
                this.isQuizActive = false;
            }

            showQuizContainer() {
                this.chapterSelection.style.display = 'none';
                this.quizContainer.style.display = 'block';
                this.resultsContainer.style.display = 'none';
            }

            showResultsContainer() {
                this.chapterSelection.style.display = 'none';
                this.quizContainer.style.display = 'none';
                this.resultsContainer.style.display = 'block';
            }

            renderQuestion() {
                if (!this.currentChapter || !this.isQuizActive) return;
                
                const question = this.currentChapter.questions[this.currentQuestionIndex];
                const totalQuestions = this.currentChapter.questions.length;
                
                // Update header
                this.quizTitle.textContent = `Chapter ${this.currentChapter.chapter}`;
                this.questionCounter.textContent = `Question ${this.currentQuestionIndex + 1} of ${totalQuestions}`;
                
                // Update progress bar
                const progress = ((this.currentQuestionIndex + 1) / totalQuestions) * 100;
                this.progressFill.style.width = `${progress}%`;
                
                // Update question
                this.questionText.textContent = question.question;
                
                // Render options
                this.optionsContainer.innerHTML = '';
                question.options.forEach((option, index) => {
                    const optionButton = document.createElement('button');
                    optionButton.className = 'option-button';
                    optionButton.textContent = option;
                    optionButton.addEventListener('click', () => this.selectOption(index, optionButton));
                    
                    // Restore previous selection
                    if (this.userAnswers[this.currentQuestionIndex] === index) {
                        optionButton.classList.add('selected');
                    }
                    
                    this.optionsContainer.appendChild(optionButton);
                });
                
                // Update button states
                this.updateButtonStates();
            }

            selectOption(optionIndex, buttonElement) {
                // Remove previous selection
                this.optionsContainer.querySelectorAll('.option-button').forEach(btn => {
                    btn.classList.remove('selected');
                });
                
                // Add selection to clicked button
                buttonElement.classList.add('selected');
                
                // Store answer
                this.userAnswers[this.currentQuestionIndex] = optionIndex;
                
                // Update button states
                this.updateButtonStates();
            }

            updateButtonStates() {
                const totalQuestions = this.currentChapter.questions.length;
                const isFirstQuestion = this.currentQuestionIndex === 0;
                const isLastQuestion = this.currentQuestionIndex === totalQuestions - 1;
                const hasAnswer = this.userAnswers[this.currentQuestionIndex] !== null;
                
                // Previous button
                this.prevBtn.disabled = isFirstQuestion;
                
                // Next button
                this.nextBtn.disabled = !hasAnswer;
                
                // Show/hide submit button
                if (isLastQuestion && hasAnswer) {
                    this.nextBtn.classList.add('hidden');
                    this.submitBtn.classList.remove('hidden');
                } else {
                    this.nextBtn.classList.remove('hidden');
                    this.submitBtn.classList.add('hidden');
                }
            }

            previousQuestion() {
                if (this.currentQuestionIndex > 0) {
                    this.currentQuestionIndex--;
                    this.renderQuestion();
                }
            }

            nextQuestion() {
                const totalQuestions = this.currentChapter.questions.length;
                if (this.currentQuestionIndex < totalQuestions - 1) {
                    this.currentQuestionIndex++;
                    this.renderQuestion();
                }
            }

            submitQuiz() {
                this.calculateScore();
                this.showResults();
            }

            calculateScore() {
                this.score = 0;
                
                this.currentChapter.questions.forEach((question, index) => {
                    const userAnswerIndex = this.userAnswers[index];
                    const userAnswer = question.options[userAnswerIndex];
                    
                    if (userAnswer === question.answer) {
                        this.score++;
                    }
                });
            }

            showResults() {
                const totalQuestions = this.currentChapter.questions.length;
                const percentage = Math.round((this.score / totalQuestions) * 100);
                
                // Display score
                this.scoreDisplay.innerHTML = `
                    <div class="celebration">🎉</div>
                    ${this.score} / ${totalQuestions}
                    <div>(${percentage}%)</div>
                `;
                
                // Display message based on score
                let message = '';
                let emoji = '';
                
                if (percentage >= 90) {
                    message = "Outstanding! You're a math superstar!";
                    emoji = "🌟⭐🌟";
                } else if (percentage >= 80) {
                    message = "Excellent work! You really know your math!";
                    emoji = "🎯🎉🎯";
                } else if (percentage >= 70) {
                    message = "Great job! You're getting better at math!";
                    emoji = "👏😊👏";
                } else if (percentage >= 60) {
                    message = "Good effort! Keep practicing and you'll improve!";
                    emoji = "💪📚💪";
                } else {
                    message = "Nice try! Practice makes perfect - try again!";
                    emoji = "🌈📖🌈";
                }
                
                this.scoreMessage.innerHTML = `
                    <div class="emoji">${emoji}</div>
                    <div>${message}</div>
                `;
                
                this.showResultsContainer();
                
                // Add celebration animation
                setTimeout(() => {
                    this.scoreDisplay.classList.add('celebration');
                }, 500);
            }
        }

        // Initialize the quiz when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            new MathQuiz();
        });

        // Add some fun interactions
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('option-button')) {
                // Add a little animation when clicking options
                e.target.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    e.target.style.transform = '';
                }, 150);
            }
        });

        // Add keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.querySelector('.option-button.selected')) {
                const nextBtn = document.getElementById('nextBtn');
                const submitBtn = document.getElementById('submitBtn');
                
                if (!nextBtn.classList.contains('hidden') && !nextBtn.disabled) {
                    nextBtn.click();
                } else if (!submitBtn.classList.contains('hidden')) {
                    submitBtn.click();
                }
            }
        });

        // Add touch support for mobile devices
        let touchStartY = 0;
        let touchEndY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartY = e.changedTouches[0].screenY;
        });

        document.addEventListener('touchend', (e) => {
            touchEndY = e.changedTouches[0].screenY;
            handleSwipe();
        });

        function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartY - touchEndY;
            
            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    // Swipe up - could trigger next question
                    const nextBtn = document.getElementById('nextBtn');
                    if (nextBtn && !nextBtn.disabled && !nextBtn.classList.contains('hidden')) {
                        nextBtn.click();
                    }
                } else {
                    // Swipe down - could trigger previous question
                    const prevBtn = document.getElementById('prevBtn');
                    if (prevBtn && !prevBtn.disabled) {
                        prevBtn.click();
                    }
                }
            }
        }
    </script>
</body>
</html>
