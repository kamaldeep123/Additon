        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        
        h1 {
            text-align: center;
            color: #ff6b6b;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .grade-selection {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .grade-btn {
            background: #4ecdc4;
            color: white;
            border: none;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 25px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .grade-btn:hover {
            background: #45b7aa;
            transform: translateY(-2px);
        }
        
        .story-container {
            display: none;
        }
        
        .story-title {
            color: #ff6b6b;
            font-size: 1.8em;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .story-content {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 1.1em;
        }
        
        .questions {
            margin-top: 30px;
        }
        
        .question {
            background: #fff;
            border: 3px solid #4ecdc4;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .question h3 {
            color: #ff6b6b;
            margin-top: 0;
        }
        
        .question-options {
            margin: 15px 0;
        }
        
        .question-options label {
            display: block;
            margin: 10px 0;
            cursor: pointer;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            transition: background 0.3s ease;
        }
        
        .question-options label:hover {
            background: #e9ecef;
        }
        
        .question-options input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.2);
        }
        
        .refresh-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.2em;
            cursor: pointer;
            margin: 20px 10px;
            transition: all 0.3s ease;
        }
        
        .refresh-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }
        
        .submit-btn {
            background: #4ecdc4;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.2em;
            cursor: pointer;
            margin: 20px 10px;
            transition: all 0.3s ease;
        }
        
        .submit-btn:hover {
            background: #45b7aa;
            transform: translateY(-2px);
        }
        
        .score {
            text-align: center;
            font-size: 1.5em;
            margin: 20px 0;
            color: #ff6b6b;
            font-weight: bold;
        }
        
        .back-btn {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        .back-btn:hover {
            background: #7f8c8d;
        }
    </style>
</head>

            <div class="story-content" id="storyContent"></div>

                <button class="refresh-btn" onclick="getRandomStory()">New Story 🔄</button>

            <div id="scoreDisplay" class="score"></div>
        </div>
    </div>

            questionsContainer.innerHTML = '';
            correctAnswers = [];

                correctAnswers.push(question.correct);

                questionDiv.className = 'question';

                question.options.forEach((option, optionIndex) => {
                    optionsHtml += `

                    score++;
                }
            }
            
            const percentage = Math.round((score / totalQuestions) * 100);
            let message = '';
            
            if (percentage >= 90) {

            } else if (percentage >= 70) {
                message = '👍 Great job! Keep up the good work! 👍';
